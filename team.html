<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Team - KijaniPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-emerald-800 text-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="assets/images/logo.png" alt="KijaniPulse Logo" class="h-12 w-auto">
        <h1 class="text-2xl font-bold">KIJANI PULSE</h1>
      </div>
      <div class="hidden md:flex gap-8 text-lg">
        <a href="index.html" class="nav-link hover:text-emerald-300">Home</a>
        <a href="about.html" class="nav-link hover:text-emerald-300">About</a>
        <a href="activities.html" class="nav-link hover:text-emerald-300">Activities</a>
        <a href="team.html" class="nav-link text-emerald-300 font-semibold">Team</a>
        <a href="merch.html" class="nav-link hover:text-emerald-300">Merch</a>
        <a href="contact.html" class="nav-link hover:text-emerald-300">Contact</a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-16">
    <h1 class="text-5xl font-bold text-center text-emerald-800 mb-4">Our Leadership Team</h1>
    <p class="text-center text-xl text-gray-600 mb-16">Passionate students driving change</p>

    <div class="grid md:grid-cols-2 gap-12 max-w-4xl mx-auto">
      
      <!-- Benedict Samwel Mfanga -->
      <div class="bg-white rounded-3xl overflow-hidden shadow-xl card-hover text-center">
        <div class="pt-10 pb-6 flex justify-center">
          <div class="relative">
            <img src="assets/images/team/benedict.jpeg" 
                 alt="Benedict Samwel Mfanga" 
                 class="w-64 h-64 rounded-full object-cover border-8 border-emerald-600 shadow-2xl">
          </div>
        </div>
        <div class="px-8 pb-6">
          <h3 class="text-2xl font-semibold">Benedict Samwel Mfanga</h3>
          <p class="text-emerald-600 font-medium mt-1">Founder + Environment and Health Minister</p>
        </div>
        <div class="pb-8">
          <button onclick="showContact(1)" 
                  class="inline-flex items-center gap-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-medium px-6 py-3 rounded-2xl transition">
            <i class="fas fa-envelope"></i>
            Contact
          </button>
        </div>
      </div>

      <!-- Roque Ricco Desouza -->
      <div class="bg-white rounded-3xl overflow-hidden shadow-xl card-hover text-center">
        <div class="pt-10 pb-6 flex justify-center">
          <div class="relative">
            <img src="assets/images/team/roque.jpg" 
                 alt="Roque Ricco Desouza" 
                 class="w-64 h-64 rounded-full object-cover border-8 border-emerald-600 shadow-2xl">
          </div>
        </div>
        <div class="px-8 pb-6">
          <h3 class="text-2xl font-semibold">Roque Ricco Desouza</h3>
          <p class="text-emerald-600 font-medium mt-1">Co-Founder</p>
        </div>
        <div class="pb-8">
          <button onclick="showContact(2)" 
                  class="inline-flex items-center gap-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-medium px-6 py-3 rounded-2xl transition">
            <i class="fas fa-envelope"></i>
            Contact
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Contact Modal -->
  <div id="contactModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl max-w-md w-full mx-4 overflow-hidden">
      <div class="p-8">
        <h2 id="modalName" class="text-2xl font-semibold text-center mb-8"></h2>
        
        <div class="space-y-6 text-gray-700">
          <div class="flex items-center gap-4">
            <i class="fas fa-envelope text-emerald-600 text-xl"></i>
            <div>
              <p class="font-medium">Email</p>
              <a href="#" id="modalEmail" class="text-emerald-600 hover:underline"></a>
            </div>
          </div>
          
          <div class="flex items-center gap-4">
            <i class="fas fa-phone text-emerald-600 text-xl"></i>
            <div>
              <p class="font-medium">Phone</p>
              <a href="#" id="modalPhone" class="text-emerald-600 hover:underline"></a>
            </div>
          </div>
          
          <div class="flex items-center gap-4">
            <i class="fab fa-instagram text-emerald-600 text-xl"></i>
            <div>
              <p class="font-medium">Instagram</p>
              <a href="#" id="modalIG" target="_blank" class="text-emerald-600 hover:underline"></a>
            </div>
          </div>
          
          <div class="flex items-center gap-4">
            <i class="fab fa-linkedin text-emerald-600 text-xl"></i>
            <div>
              <p class="font-medium">LinkedIn</p>
              <a href="#" id="modalLinkedIn" target="_blank" class="text-emerald-600 hover:underline"></a>
            </div>
          </div>
        </div>
      </div>
      
      <div class="border-t p-4">
        <button onclick="closeModal()" 
                class="w-full py-4 text-emerald-700 font-medium hover:bg-gray-100 rounded-2xl">
          Close
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/script.js"></script>

  <script>
    function showContact(person) {
      const modal = document.getElementById('contactModal');
      
      if (person === 1) {
        // Benedict Samwel Mfanga
        document.getElementById('modalName').textContent = "Benedict Samwel Mfanga";
        
        document.getElementById('modalEmail').textContent = "benedictmfanga@gmail.com";
        document.getElementById('modalEmail').href = "mailto:benedictmfanga@gmail.com";
        
        document.getElementById('modalPhone').textContent = "+255 684 701 881";
        document.getElementById('modalPhone').href = "tel:+255684701881";
        
        document.getElementById('modalIG').textContent = "@benie.sm";
        document.getElementById('modalIG').href = "https://www.instagram.com/benie.sm";
        
        document.getElementById('modalLinkedIn').textContent = "Benedict Mfanga";
        document.getElementById('modalLinkedIn').href = "https://www.linkedin.com/in/benedict-mfanga-b96771385";
      } 
      else if (person === 2) {
        // Roque Ricco Desouza
        document.getElementById('modalName').textContent = "Roque Ricco Desouza";
        
        document.getElementById('modalEmail').textContent = "roquedesouza209@gmail.com";
        document.getElementById('modalEmail').href = "mailto:roquedesouza209@gmail.com";
        
        document.getElementById('modalPhone').textContent = "+255 744 952 619";
        document.getElementById('modalPhone').href = "tel:+255744952619";
        
        document.getElementById('modalIG').textContent = "@r_.oque";
        document.getElementById('modalIG').href = "https://www.instagram.com/r_.oque";
        
        document.getElementById('modalLinkedIn').textContent = "Roque Ricco Desouza";
        document.getElementById('modalLinkedIn').href = "https://www.linkedin.com/in/roque-desouza";
      }
      
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('contactModal').classList.add('hidden');
    }
  </script>
</body>
</html>
